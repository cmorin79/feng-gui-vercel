<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NeuroMap · Feng-GUI Analyzer</title>
  <style>
    :root { --ink:#1b1b1f; --muted:#6b6b76; --line:#e6e6ea; --accent:#e8662a; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
           color: var(--ink); margin: 0; padding: 40px 20px; background:#fafafa; }
    .wrap { max-width: 820px; margin: 0 auto; }
    h1 { font-size: 22px; margin: 0 0 4px; }
    p.sub { color: var(--muted); margin: 0 0 24px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:12px; padding:20px; }
    label { font-size: 13px; color: var(--muted); display:block; margin-bottom:6px; }
    input[type=text] { width:100%; padding:10px 12px; border:1px solid var(--line);
                       border-radius:8px; font-size:14px; }
    button { margin-top:14px; background:var(--accent); color:#fff; border:0; border-radius:8px;
             padding:10px 18px; font-size:14px; font-weight:600; cursor:pointer; }
    button:disabled { opacity:.5; cursor:default; }
    pre { background:#0f1115; color:#d6e2ff; padding:14px; border-radius:8px; overflow:auto;
          font-size:12px; max-height:340px; }
    .maps { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; margin-top:16px; }
    .maps img { width:100%; border:1px solid var(--line); border-radius:8px; }
    .err { color:#b00020; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>NeuroMap · Feng-GUI Analyzer</h1>
    <p class="sub">Paste a public image URL, run the analysis, and pull the attention maps.</p>
    <div class="card">
      <label for="url">Public image URL</label>
      <input id="url" type="text" placeholder="https://this-app.vercel.app/campaign.jpg" />
      <button id="go">Analyze</button>
      <div id="status" class="sub" style="margin-top:12px"></div>
      <div id="maps" class="maps"></div>
      <pre id="out" style="display:none"></pre>
    </div>
  </div>
  <script>
    const $ = (id) => document.getElementById(id);
    $("go").addEventListener("click", async () => {
      const url = $("url").value.trim();
      if (!url) return;
      $("go").disabled = true;
      $("status").textContent = "Analyzing…";
      $("maps").innerHTML = "";
      $("out").style.display = "none";
      try {
        const res = await fetch("/api/analyze?image=" + encodeURIComponent(url));
        const data = await res.json();
        $("out").style.display = "block";
        $("out").textContent = JSON.stringify(data, null, 2);
        // Render any image URLs found in the response as map previews.
        const imgs = [];
        JSON.stringify(data).replace(/https?:\/\/[^"\\ ]+\.(png|jpg|jpeg|gif|webp)/gi, (m) => { imgs.push(m); return m; });
        if (imgs.length) {
          $("maps").innerHTML = [...new Set(imgs)].map((u) => `<img src="${u}" alt="map" />`).join("");
        }
        $("status").textContent = res.ok ? "Done." : "Returned an error — see details below.";
        $("status").className = res.ok ? "sub" : "err";
      } catch (e) {
        $("status").textContent = "Request failed: " + e;
        $("status").className = "err";
      } finally {
        $("go").disabled = false;
      }
    });
  </script>
</body>
</html>
